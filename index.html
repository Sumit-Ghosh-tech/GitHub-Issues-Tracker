<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              githubPrimary: "#5832FF",
              githubDark: "#0D1117",
            },
          },
        },
      };
    </script>
    <style>
      /*Scrollbar for Modal */
      .modal-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .modal-scroll::-webkit-scrollbar-thumb {
        background-color: #cbd5e1;
        border-radius: 10px;
      }
    </style>
  </head>
  <body
    class="bg-githubDark text-gray-800 font-sans antialiased h-screen w-screen overflow-x-hidden"
  >
    <!-- Loading spinner -->
    <div
      id="loader"
      class="hidden fixed inset-0 bg-black bg-opacity-60 z-[100] flex justify-center items-center"
    >
      <div
        class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-githubPrimary"
      ></div>
    </div>

    <!-- Login page -->
    <div
      id="login-page"
      class="flex items-center justify-center min-h-screen p-4"
    >
      <div
        class="bg-white rounded-lg p-10 w-full max-w-md shadow-2xl flex flex-col items-center"
      >
        <i class="fa-brands fa-github text-5xl mb-4"></i>
        <h1 class="text-2xl font-bold mb-1">GitHub Issues Tracker</h1>
        <p class="text-gray-500 text-sm mb-6">Sign in to manage your issues</p>

        <form id="login-form" class="w-full space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700"
              >Username</label
            >
            <input
              type="text"
              id="username"
              class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-githubPrimary focus:border-githubPrimary sm:text-sm"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">
              Password</label
            >
            <input
              type="password"
              id="password"
              class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-githubPrimary focus:border-githubPrimary sm:text-sm"
            />
          </div>
          <button
            type="submit"
            class="w-full bg-githubPrimary text-white py-2 px-4 rounded-md hover:bg-blue-700 transition"
          >
            Sign In
          </button>
        </form>

        <div class="mt-6 flex items-center w-full">
          <hr class="flex-grow border-gray-300" />
          <span class="px-3 text-gray-400 text-sm">OR</span>
          <hr class="flex-grow border-gray-300" />
        </div>

        <div
          class="mt-6 bg-gray-50 p-4 rounded-md w-full text-center border border-gray-200"
        >
          <p class="text-sm text-gray-600 font-medium">Demo Credentials:</p>
          <p class="text-sm font-bold text-gray-800 mt-1">Username: admin</p>
          <p class="text-sm font-bold text-gray-800">Password: admin123</p>
        </div>
        <p id="login-error" class="text-red-500 text-sm mt-3 hidden">
          Invalid credentials!
        </p>
      </div>
    </div>

    <!-- Main dashboard -->
    <div id="dashboard-page" class="hidden min-h-screen bg-gray-50">
      <!-- Navbar -->
      <nav
        class="bg-white border-b border-gray-200 px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4 sticky top-0 z-40 shadow-sm"
      >
        <div class="flex items-center gap-2 text-xl font-bold">
          <i class="fa-brands fa-github text-2xl"></i>
          All Issue
        </div>
        <div class="flex items-center gap-4 w-full md:w-auto">
          <form id="search-form" class="relative w-full md:w-80">
            <i
              class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400 text-sm"
            ></i>
            <input
              type="text"
              id="search-input"
              placeholder="Search issues..."
              class="w-full pl-9 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-githubPrimary text-sm"
            />
          </form>
          <button
            class="bg-githubPrimary text-white px-4 py-2 rounded-md text-sm whitespace-nowrap hover:bg-blue-700 transition flex items-center gap-2"
          >
            Search
          </button>
        </div>
      </nav>

      <!-- Main Content -->
      <main class="max-w-[1400px] mx-auto px-6 py-8">
        <!-- Tabs -->
        <div
          class="flex bg-white rounded-md border border-gray-200 w-fit mb-6 shadow-sm overflow-hidden"
        >
          <button
            class="tab-btn active-tab px-6 py-2 text-sm font-medium border-r border-gray-200"
            data-tab="All"
          >
            All
          </button>
          <button
            class="tab-btn px-6 py-2 text-sm font-medium border-r border-gray-200 text-gray-600 hover:bg-gray-50"
            data-tab="Open"
          >
            Open
          </button>
          <button
            class="tab-btn px-6 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50"
            data-tab="Closed"
          >
            Closed
          </button>
        </div>

        <!-- Issues Header -->
        <div
          class="flex justify-between items-center mb-6 bg-white p-4 rounded-lg shadow-sm border border-gray-100"
        >
          <div class="flex items-center gap-3">
            <div class="bg-purple-100 text-purple-600 p-2 rounded-full">
              <i class="fa-solid fa-circle-dot"></i>
            </div>
            <div>
              <h2 class="text-lg font-bold">
                <span id="issue-count">0</span> Issues
              </h2>
              <p class="text-sm text-gray-500">
                Track and manage your project issues
              </p>
            </div>
          </div>
          <div class="flex gap-4 text-sm font-medium">
            <span class="flex items-center gap-1"
              ><span class="w-2.5 h-2.5 rounded-full bg-green-500"></span>
              Open</span
            >
            <span class="flex items-center gap-1">
              <span class="w-2.5 h-2.5 rounded-full bg-purple-500"></span>
              Closed</span
            >
          </div>
        </div>

        <!-- Issues Grid -->
        <div
          id="issues-grid"
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"
        ></div>
      </main>
    </div>

    <!-- Modal -->
    <div
      id="issue-modal"
      class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex justify-center items-center p-4 backdrop-blur-sm"
    >
      <div
        class="bg-white rounded-xl shadow-2xl w-full max-w-3xl overflow-hidden flex flex-col max-h-[90vh]"
      >
        <div class="p-8 modal-scroll overflow-y-auto">
          <h2
            id="modal-title"
            class="text-3xl font-bold mb-3 text-gray-800"
          ></h2>

          <div
            class="flex items-center gap-3 text-sm text-gray-500 mb-6 border-b pb-6"
          >
            <span
              id="modal-status"
              class="px-3 py-1 rounded-full text-white font-medium"
            ></span>
            <span>•</span>
            <span id="modal-author"></span>
            <span>•</span>
            <span id="modal-date"></span>
          </div>

          <div id="modal-labels" class="flex flex-wrap gap-2 mb-6"></div>

          <p
            id="modal-desc"
            class="text-gray-700 text-lg leading-relaxed mb-8"
          ></p>

          <div
            class="bg-gray-50 p-6 rounded-lg border border-gray-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4"
          >
            <div>
              <p class="text-sm text-gray-500 mb-1">Assignee:</p>
              <p id="modal-assignee" class="font-bold text-gray-800 text-lg">
                Unassigned
              </p>
            </div>
            <div>
              <p class="text-sm text-gray-500 mb-1">Priority:</p>
              <span
                id="modal-priority"
                class="px-3 py-1 bg-red-500 text-white rounded-full text-sm font-medium"
              ></span>
            </div>
          </div>
        </div>
        <div class="bg-gray-50 px-8 py-4 border-t flex justify-end">
          <button
            id="close-modal"
            class="bg-githubPrimary hover:bg-blue-700 text-white px-6 py-2 rounded-md font-medium transition"
          >
            Close
          </button>
        </div>
      </div>
    </div>

    <script>
      // API Base URL
      const API_BASE = "https://phi-lab-server.vercel.app/api/v1/lab";
      let allIssuesData = [];
      let currentFilter = "All";

      // DOM Elements
      const loader = document.getElementById("loader");
      const loginPage = document.getElementById("login-page");
      const dashboardPage = document.getElementById("dashboard-page");
      const loginForm = document.getElementById("login-form");
      const issuesGrid = document.getElementById("issues-grid");
      const issueCount = document.getElementById("issue-count");
      const tabBtns = document.querySelectorAll(".tab-btn");
      const searchForm = document.getElementById("search-form");
      const searchInput = document.getElementById("search-input");
      const modal = document.getElementById("issue-modal");

      // Styles for dynamic elements
      const activeTabClass = "bg-githubPrimary text-white";
      const inactiveTabClass = "text-gray-600 hover:bg-gray-50";

      // --- Login ---
      loginForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const user = document.getElementById("username").value;
        const pass = document.getElementById("password").value;

        if (user === "admin" && pass === "admin123") {
          loginPage.classList.add("hidden");
          document.body.classList.remove("bg-githubDark");
          dashboardPage.classList.remove("hidden");
          fetchIssues();
        } else {
          document.getElementById("login-error").classList.remove("hidden");
        }
      });

      // --- Fetch All Issues ---
      async function fetchIssues() {
        showLoader();
        try {
          const response = await fetch(`${API_BASE}/issues`);
          const data = await response.json();
          allIssuesData = data.data || data;
          renderIssues(allIssuesData);
        } catch (error) {
          console.error("Error fetching issues:", error);
          issuesGrid.innerHTML = `<p class="text-red-500 col-span-full text-center">Failed to load issues.</p>`;
        }
        hideLoader();
      }

      // ---Render Issue Cards ---
      function renderIssues(issuesToRender) {
        issuesGrid.innerHTML = "";
        issueCount.innerText = issuesToRender.length;

        if (issuesToRender.length === 0) {
          issuesGrid.innerHTML = `<p class="col-span-full text-center text-gray-500 py-10">No issues found.</p>`;
          return;
        }

        issuesToRender.forEach((issue) => {
          const isOpen = issue.status?.toLowerCase() === "open";
          const borderColor = isOpen ? "border-green-400" : "border-purple-500";
          const iconColor = isOpen ? "text-green-500" : "text-purple-500";
          const dateObj = new Date(issue.createdAt || Date.now());
          const formattedDate = `${dateObj.getMonth() + 1}/${dateObj.getDate()}/${dateObj.getFullYear()}`;

          // Priority Badge
          let priorityBadge = "";
          if (issue.priority) {
            priorityBadge = `<span class="text-[10px] bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full uppercase font-bold">${issue.priority}</span>`;
          }

          // Labels
          let labelsHtml = "";
          if (issue.labels && Array.isArray(issue.labels)) {
            issue.labels.forEach((label) => {
              labelsHtml += `<span class="text-xs px-2 py-1 rounded-full border border-red-200 text-red-500 bg-red-50 font-medium">${label}</span>`;
            });
          }

          const cardHTML = `
                    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-5 border-t-4 ${borderColor} hover:shadow-md transition cursor-pointer flex flex-col h-full" onclick="openModal('${issue._id || issue.id}')">
                        <div class="flex justify-between items-start mb-2">
                            <i class="fa-regular fa-circle-dot ${iconColor} mt-1"></i>
                            ${priorityBadge}
                        </div>
                        <h3 class="font-bold text-gray-800 text-sm mb-2 line-clamp-2">${issue.title}</h3>
                        <p class="text-gray-500 text-xs mb-4 line-clamp-3 flex-grow">
                        ${issue.description ? issue.description : "No description available"}
                      </p>
                        
                        <div class="flex flex-wrap gap-2 mb-4">
                            ${labelsHtml}
                        </div>
                        
                        <div class="text-[11px] text-gray-400 mt-auto pt-3 border-t border-gray-100">
                            #${issue._id || issue.id} by ${issue.author || "Unknown"}<br>
                            ${formattedDate}
                        </div>
                    </div>
                `;
          issuesGrid.insertAdjacentHTML("beforeend", cardHTML);
        });
      }

      // ---Tabs & Filtering ---
      tabBtns.forEach((btn) => {
        btn.addEventListener("click", (e) => {
          tabBtns.forEach((b) => {
            b.className = `tab-btn px-6 py-2 text-sm font-medium border-r border-gray-200 ${inactiveTabClass}`;
          });
          e.target.className = `tab-btn px-6 py-2 text-sm font-medium border-r border-gray-200 ${activeTabClass}`;

          currentFilter = e.target.getAttribute("data-tab");
          filterData();
        });
      });

      function filterData() {
        if (currentFilter === "All") {
          renderIssues(allIssuesData);
        } else {
          const filtered = allIssuesData.filter(
            (issue) =>
              (issue.status || "").toLowerCase() ===
              currentFilter.toLowerCase(),
          );
          renderIssues(filtered);
        }
      }

      // --- Search Functionality ---
      searchForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const query = searchInput.value.trim();
        if (!query) {
          fetchIssues();
          return;
        }

        showLoader();
        try {
          const response = await fetch(
            `${API_BASE}/issues/search?q=${encodeURIComponent(query)}`,
          );
          const data = await response.json();
          allIssuesData = data.data || data;
          document.querySelector('[data-tab="All"]').click();
          renderIssues(allIssuesData);
        } catch (error) {
          console.error("Search failed:", error);
        }
        hideLoader();
      });

      // --- Modal Functionality ---
      async function openModal(id) {
        showLoader();
        try {
          const response = await fetch(`${API_BASE}/issue/${id}`);
          const data = await response.json();
          const issue = data.data || data;
          document.getElementById("modal-title").innerText = issue.title;
          document.getElementById("modal-desc").innerText =
            issue.description || "No description provided.";

          const isOpen = issue.status?.toLowerCase() === "open";
          const statusEl = document.getElementById("modal-status");
          statusEl.innerText = issue.status || "Open";
          statusEl.className = `px-3 py-1 rounded-full text-white text-xs font-bold uppercase ${isOpen ? "bg-green-500" : "bg-purple-500"}`;

          const dateObj = new Date(issue.createdAt || Date.now());
          document.getElementById("modal-author").innerText =
            `Opened by ${issue.author || "Unknown"}`;
          document.getElementById("modal-date").innerText =
            `${dateObj.getDate()}/${dateObj.getMonth() + 1}/${dateObj.getFullYear()}`;

          // Labels
          const labelsContainer = document.getElementById("modal-labels");
          labelsContainer.innerHTML = "";
          if (issue.labels && Array.isArray(issue.labels)) {
            issue.labels.forEach((label) => {
              labelsContainer.innerHTML += `<span class="text-xs px-3 py-1 rounded-full border border-red-200 text-red-600 bg-red-50 font-bold">${label}</span>`;
            });
          }

          document.getElementById("modal-assignee").innerText =
            issue.assignee || issue.author || "Unassigned";
          document.getElementById("modal-priority").innerText =
            issue.priority || "NORMAL";

          modal.classList.remove("hidden");
        } catch (error) {
          console.error("Failed to fetch issue details:", error);
          alert("Failed to load issue details.");
        }
        hideLoader();
      }

      document.getElementById("close-modal").addEventListener("click", () => {
        modal.classList.add("hidden");
      });

      modal.addEventListener("click", (e) => {
        if (e.target === modal) {
          modal.classList.add("hidden");
        }
      });

      // --- Utility Loader ---
      function showLoader() {
        loader.classList.remove("hidden");
      }
      function hideLoader() {
        loader.classList.add("hidden");
      }
    </script>
  </body>
</html>
